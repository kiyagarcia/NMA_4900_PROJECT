<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>NMA Capstone Prototype</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="scene">

  <div id="soundInstruction">Click to feel the heartbeat</div>
  
  <div id="shadowWrap" class="idle">
  <div id="shadow">
    <div class="shadow-core">
      <div class="shadow-eye left-eye"></div>
      <div class="shadow-eye right-eye"></div>
    </div>
    <div id="shield"></div>
  </div>

 
</div>

<div id="studentWrap" class="idle">
  <div id="student">
    <img src="The_Self_Design_2.svg" class="student-img">
    <div id="heart"></div>
  </div>
</div>

<div id="school">
  <img src="ShadowSelf_Background.png" id="background">
</div>

<img src="hand.png" id="hand">

</div>

<audio id="heartbeatSound" src="heartbeat.wav" loop></audio>
 <script src="script.js"></script>

</body>
</html>
